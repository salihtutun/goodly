[tool]
[tool.pytest.ini_options]
testpaths = ["tests/unit", "tests/integration"]
pythonpath = ["backend"]
addopts = "-v --tb=short --strict-markers"
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning:slowapi.*",
    "ignore::DeprecationWarning:starlette.*",
]
markers = [
    "unit: Unit tests (no external dependencies)",
    "integration: Integration tests (requires running backend)",
    "slow: Slow tests (AI calls, network)",
    "e2e: End-to-end tests",
    "asyncio: Async test marker",
]

[run]
source = ["backend"]
omit = ["tests/*", "api/*"]

[report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
fail_under = 95

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W"]
# E402: module level import not at top of file — intentional for load_dotenv()
# F841: unused variable — common pattern for except Exception as e with logger.exception
ignore = ["E402", "F841"]
