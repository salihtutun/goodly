# Goodly CI Pipeline
# Runs on every PR and push to main: tests, lint, build

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r backend/requirements.txt
      - run: pip install pytest pytest-cov pytest-asyncio pytest-mock mongomock
      - run: |
          cd /home/runner/work/goodly/goodly
          python -m pytest tests/unit/ tests/integration/ -v --tb=short --cov=backend --cov-report=xml --cov-report=term
        env:
          MONGO_URL: mongodb://localhost:27017
          JWT_SECRET: test-secret-for-ci-32bytes-long!!
          GEMINI_API_KEY: test-key
          STRIPE_API_KEY: test-key
          STRIPE_WEBHOOK_SECRET: test-secret
          RESEND_API_KEY: test-key
          ENVIRONMENT: test
          SCHEDULER_ENABLED: false
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --legacy-peer-deps
      - run: cd frontend && npm test -- --watchAll=false --passWithNoTests
      - run: cd frontend && npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/ --ignore=E501
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd frontend && npx eslint src/ --ext .jsx,.js --no-error-on-unmatched-pattern || true
