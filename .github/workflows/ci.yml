# Goodly CI Pipeline
# Runs on every PR and push to main: tests, lint, build, e2e

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r backend/requirements.txt
      - run: pip install pytest pytest-cov pytest-asyncio pytest-mock mongomock
      - run: |
          python -m pytest tests/unit/ tests/integration/ -v --tb=short --cov=backend --cov-report=xml --cov-report=term
        env:
          MONGO_URL: mongodb://localhost:27017
          JWT_SECRET: test-secret-for-ci-32bytes-long!!
          GEMINI_API_KEY: test-key
          STRIPE_API_KEY: sk_test_placeholder
          RESEND_API_KEY: re_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_test_placeholder
          ENVIRONMENT: test
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --legacy-peer-deps
      - run: cd frontend && npm test -- --watchAll=false --passWithNoTests
      - run: cd frontend && npm run build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install @playwright/test
      - run: npx playwright install chromium --with-deps
      - run: |
          FRONTEND_URL=https://searchgoodly.com \
          npx playwright test --config=tests/e2e/playwright.config.js \
            tests/e2e/smoke-tests.spec.js \
            tests/e2e/authenticated.spec.js \
            tests/e2e/full-coverage.spec.js \
            --reporter=html
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/ --ignore=E501
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd frontend && npx eslint src/ --ext .jsx,.js --no-error-on-unmatched-pattern || true
