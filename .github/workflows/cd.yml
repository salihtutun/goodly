# Goodly CD Pipeline
# Deploys the API to Google Cloud Run on merge to main.
# Frontend deploys via Vercel (see frontend/vercel.json) — not Cloud Run.

name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/goodly/goodly-api:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/goodly/goodly-api:${{ github.sha }}

      - name: Pre-deploy smoke test
        run: |
          sleep 30  # Wait for new revision to start serving
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://api.searchgoodly.com/api/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              break
            fi
            echo "Attempt $i: got $STATUS, retrying..."
            sleep 10
          done
          curl -s --max-time 10 "https://api.searchgoodly.com/api/health" | grep -q '"status":"ok"' || exit 1
          echo "Smoke test passed"

      - run: |
          gcloud run deploy goodly-api \
            --image=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/goodly/goodly-api:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --env-vars-file=cloudrun-env.yaml \
            --set-secrets=MONGO_URL=MONGO_URL:latest \
            --set-secrets=JWT_SECRET=JWT_SECRET:latest \
            --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest \
            --set-secrets=STRIPE_API_KEY=STRIPE_API_KEY:latest \
            --set-secrets=RESEND_API_KEY=RESEND_API_KEY:latest \
            --set-secrets=STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest \
            --set-secrets=STRIPE_PRICE_ID_STARTER=STRIPE_PRICE_ID_STARTER:latest \
            --set-secrets=STRIPE_PRICE_ID_STARTER_ANNUAL=STRIPE_PRICE_ID_STARTER_ANNUAL:latest \
            --set-secrets=STRIPE_PRICE_ID_PRO=STRIPE_PRICE_ID_PRO:latest \
            --set-secrets=STRIPE_PRICE_ID_PRO_ANNUAL=STRIPE_PRICE_ID_PRO_ANNUAL:latest \
            --set-secrets=STRIPE_PRICE_ID_CONCIERGE=STRIPE_PRICE_ID_CONCIERGE:latest \
            --set-secrets=GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest \
            --set-secrets=SENTRY_DSN=SENTRY_DSN:latest
