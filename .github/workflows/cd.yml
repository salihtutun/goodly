# Goodly CD Pipeline
# Deploys the API to Google Cloud Run on merge to main.
# Frontend deploys via Vercel (see frontend/vercel.json) — not Cloud Run.

name: Deploy to Cloud Run

on:
  push:
    branches: [main, master]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/goodly/goodly-api:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/goodly/goodly-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy goodly-api \
            --image=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/goodly/goodly-api:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --env-vars-file=cloudrun-env.yaml \
            --set-secrets=MONGO_URL=MONGO_URL:latest,JWT_SECRET=JWT_SECRET:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,STRIPE_API_KEY=STRIPE_API_KEY:latest,RESEND_API_KEY=RESEND_API_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,STRIPE_PRICE_ID_STARTER=STRIPE_PRICE_ID_STARTER:latest,STRIPE_PRICE_ID_STARTER_ANNUAL=STRIPE_PRICE_ID_STARTER_ANNUAL:latest,STRIPE_PRICE_ID_PRO=STRIPE_PRICE_ID_PRO:latest,STRIPE_PRICE_ID_PRO_ANNUAL=STRIPE_PRICE_ID_PRO_ANNUAL:latest,STRIPE_PRICE_ID_CONCIERGE=STRIPE_PRICE_ID_CONCIERGE:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,SENTRY_DSN=SENTRY_DSN:latest,DEMO_PASSWORD=DEMO_PASSWORD:latest,SCHEDULER_API_KEY=SCHEDULER_API_KEY:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest

      - name: Post-deploy smoke test
        run: |
          # Single retry loop that checks the body directly — the old version
          # did one final un-retried curl which failed on cold-start timeouts
          # even though the deploy was healthy.
          for i in 1 2 3 4 5 6; do
            BODY=$(curl -s --max-time 15 "https://api.searchgoodly.com/api/health" || true)
            if echo "$BODY" | grep -q '"status":"ok"'; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Attempt $i: not healthy yet, retrying..."
            sleep 10
          done
          echo "Smoke test failed after 6 attempts"
          exit 1
