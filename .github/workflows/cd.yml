# Goodly CD Pipeline
# Deploys to Google Cloud Run on merge to main

name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/goodly/goodly-api:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/goodly/goodly-api:${{ github.sha }}

      - run: |
          gcloud run deploy goodly-api \
            --image=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/goodly/goodly-api:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --set-env-vars=ENVIRONMENT=production,SCHEDULER_ENABLED=true \
            --set-secrets=MONGO_URL=MONGO_URL:latest \
            --set-secrets=JWT_SECRET=JWT_SECRET:latest \
            --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest \
            --set-secrets=STRIPE_API_KEY=STRIPE_API_KEY:latest \
            --set-secrets=RESEND_API_KEY=RESEND_API_KEY:latest \
            --set-secrets=STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: cd frontend && npm ci --legacy-peer-deps

      - name: Get backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe goodly-api --region=us-central1 --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - run: cd frontend && REACT_APP_BACKEND_URL=${{ steps.backend.outputs.url }} npm run build

      - run: |
          gcloud run deploy goodly-frontend \
            --source=./frontend \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --set-env-vars=REACT_APP_BACKEND_URL=${{ steps.backend.outputs.url }}
