# Goodly — Google Cloud Run Deployment Configuration
# Deploy: gcloud run deploy goodly-api --source . --region us-central1 --allow-unauthenticated

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/goodly-api', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/goodly-api']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'goodly-api'
      - '--image=gcr.io/$PROJECT_ID/goodly-api'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--set-env-vars=ENVIRONMENT=production'
      - '--set-secrets=MONGO_URL=MONGO_URL:latest'
      - '--set-secrets=JWT_SECRET=JWT_SECRET:latest'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--set-secrets=STRIPE_API_KEY=STRIPE_API_KEY:latest'
      - '--set-secrets=RESEND_API_KEY=RESEND_API_KEY:latest'
      - '--set-secrets=STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest'

images:
  - 'gcr.io/$PROJECT_ID/goodly-api'
