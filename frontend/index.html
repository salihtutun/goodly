<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2D3E32" />
    <meta name="description" content="Goodly — Visibility OS for Small Businesses. Get found on Google, Instagram, TikTok, YouTube, and AI assistants. Free SEO audit in 10 seconds." />
    <link rel="canonical" href="https://searchgoodly.com" />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Goodly — Visibility OS for Small Businesses" />
    <meta property="og:description" content="Get found on Google, Instagram, TikTok, and YouTube. Free SEO audit in 10 seconds. No signup required." />
    <meta property="og:image" content="https://searchgoodly.com/og-image.png" />
    <meta property="og:url" content="https://searchgoodly.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Goodly — Visibility OS for Small Businesses" />
    <meta name="twitter:description" content="Get found on Google, Instagram, TikTok, and YouTube. Free SEO audit in 10 seconds." />
    <meta name="twitter:image" content="https://searchgoodly.com/og-image.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Goodly",
      "applicationCategory": "BusinessApplication",
      "description": "Visibility OS for small businesses. SEO audits, social media analysis, and AI-powered recommendations.",
      "url": "https://searchgoodly.com",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "operatingSystem": "Web"
    }
    </script>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo192.png" />

    <!-- Fonts the app actually uses: Outfit (body) + Cabinet Grotesk (display).
         Loaded async (media=print swap trick) so first paint isn't blocked —
         font-display:swap shows system fonts until they arrive. Previously these
         were CSS @imports (serial, render-blocking) and this file preloaded
         Inter, which nothing uses. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
      <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Google Analytics is loaded at runtime via useAnalytics (REACT_APP_GA_ID).
         The placeholder inline snippet was removed — re-add here only with a real ID. -->

    <title>Goodly — Visibility OS for Small Businesses</title>
  </head>
  <body>
    <!-- Meta Pixel removed — it was initialized with a placeholder ID.
         Re-add here only with a real Pixel ID. -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:bg-[#2D3E32] focus:text-[#FDFBF7] focus:px-4 focus:py-2 focus:rounded-full">Skip to main content</a>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
