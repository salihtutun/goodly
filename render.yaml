services:
  - type: web
    name: goodly-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DB_NAME
        value: goodly
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: FRONTEND_URL
        value: https://frontend-beta-weld-93.vercel.app
      - key: PRODUCTION_DOMAIN
        value: https://frontend-beta-weld-93.vercel.app
      - key: CORS_ORIGINS
        value: https://frontend-beta-weld-93.vercel.app
      - key: SENDER_EMAIL
        value: hello@goodly.app
      - key: ADMIN_EMAIL
        value: admin@goodly.app
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
