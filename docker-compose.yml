version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: goodly-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: goodly
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goodly-backend
    ports:
      - "8001:8080"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/goodly
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SENDER_EMAIL=${SENDER_EMAIL:-onboarding@resend.dev}
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3000,https://searchgoodly.com,https://www.searchgoodly.com
      - FRONTEND_URL=http://localhost:3000
      - PRODUCTION_DOMAIN=https://searchgoodly.com
      - ADMIN_EMAIL=admin@searchgoodly.com
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-}
      - SCHEDULER_ENABLED=true
    depends_on:
      mongodb:
        condition: service_healthy
    command: uvicorn server:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: goodly-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
    depends_on:
      - backend
    command: npm start

volumes:
  mongo_data:
